<div class="card p-3 m-3 surface-card border-round shadow-2">
  <div class="flex justify-content-between align-items-center mb-3">
    <h2>Catálogo de Maquinaria y Activos</h2>
    <p-button label="Registrar Activo" icon="pi pi-plus" (onClick)="showDialogToAdd()"></p-button>
  </div>

  <p-table [value]="assets" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm p-datatable-striped">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="code">Código <p-sortIcon field="code"></p-sortIcon></th>
        <th pSortableColumn="name">Maquinaria / Activo <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="category">Categoría <p-sortIcon field="category"></p-sortIcon></th>
        <th pSortableColumn="brand">Marca <p-sortIcon field="brand"></p-sortIcon></th>
        <th pSortableColumn="status">Estado <p-sortIcon field="status"></p-sortIcon></th>
        <th pSortableColumn="currentValue">Valor S/. <p-sortIcon field="currentValue"></p-sortIcon></th>
        <th style="width: 10rem">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-asset>
      <tr>
        <td>{{asset.code}}</td>
        <td>{{asset.name}}</td>
        <td>{{asset.category}}</td>
        <td>{{asset.brand}}</td>
        <td><span class="p-badge" [ngClass]="{'p-badge-success': asset.status === 'disponible', 'p-badge-warning': asset.status === 'mantenimiento', 'p-badge-danger': asset.status === 'vendido'}">{{asset.status | uppercase}}</span></td>
        <td>{{asset.currentValue | currency:'PEN':'S/. '}}</td>
        <td>
          <p-button icon="pi pi-pencil" styleClass="p-button-warning p-button-sm mr-2" (onClick)="showDialogToEdit(asset)"></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7">No se encontraron activos.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<!-- Modal para Crear/Editar Activo -->
<p-dialog header="{{ editingAssetId ? 'Editar Activo' : 'Nuevo Activo' }}" [(visible)]="displayModal" [modal]="true" [style]="{width: '50vw'}">
  <div class="p-fluid grid">
    <div class="field col-12 md:col-6">
      <label for="code">Código Interno *</label>
      <input pInputText id="code" [(ngModel)]="assetForm.code" required />
    </div>
    <div class="field col-12 md:col-6">
      <label for="name">Descripción/Nombre *</label>
      <input pInputText id="name" [(ngModel)]="assetForm.name" required />
    </div>
    <div class="field col-12 md:col-6">
      <label for="category">Categoría</label>
      <input pInputText id="category" [(ngModel)]="assetForm.category" />
    </div>
    <div class="field col-12 md:col-6">
      <label for="brand">Marca</label>
      <input pInputText id="brand" [(ngModel)]="assetForm.brand" />
    </div>
    <div class="field col-12 md:col-6">
      <label for="model">Modelo</label>
      <input pInputText id="model" [(ngModel)]="assetForm.model" />
    </div>
    <div class="field col-12 md:col-6">
      <label for="status">Estado *</label>
      <p-dropdown [options]="statusOptions" [(ngModel)]="assetForm.status" appendTo="body"></p-dropdown>
    </div>
    <div class="field col-12 md:col-4">
      <label for="purchasePriceCNY">Costo Compra (CNY)</label>
      <p-inputNumber inputId="purchasePriceCNY" [(ngModel)]="assetForm.purchasePriceCNY" mode="currency" currency="CNY"></p-inputNumber>
    </div>
    <div class="field col-12 md:col-4">
      <label for="purchasePriceUSD">Costo Compra (S/.)</label>
      <p-inputNumber inputId="purchasePriceUSD" [(ngModel)]="assetForm.purchasePriceUSD" mode="decimal" prefix="S/. "></p-inputNumber>
    </div>
    <div class="field col-12 md:col-4">
      <label for="currentValue">Valor Actual (S/.)</label>
      <p-inputNumber inputId="currentValue" [(ngModel)]="assetForm.currentValue" mode="decimal" prefix="S/. "></p-inputNumber>
    </div>
    <div class="field col-12">
      <label for="notes">Notas adicionales</label>
      <input pInputText id="notes" [(ngModel)]="assetForm.notes" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" styleClass="p-button-text" (onClick)="displayModal=false"></p-button>
    <p-button label="Guardar" icon="pi pi-check" (onClick)="saveAsset()" [disabled]="!assetForm.code || !assetForm.name"></p-button>
  </ng-template>
</p-dialog>
