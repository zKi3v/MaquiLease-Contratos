<div class="card p-3 m-3 surface-card border-round shadow-2">
  <div class="flex justify-content-between align-items-center mb-3">
    <h2>Catálogo de Servicios</h2>
    <p-button label="Nuevo Servicio" icon="pi pi-plus" (onClick)="showDialogToAdd()"></p-button>
  </div>

  <p-table [value]="services" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm p-datatable-striped">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="code">Código <p-sortIcon field="code"></p-sortIcon></th>
        <th pSortableColumn="name">Servicio <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="serviceType">Tipo <p-sortIcon field="serviceType"></p-sortIcon></th>
        <th pSortableColumn="basePrice">Precio Base <p-sortIcon field="basePrice"></p-sortIcon></th>
        <th>Unidad</th>
        <th>Req. Activo</th>
        <th style="width: 10rem">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-svc>
      <tr>
        <td>{{svc.code}}</td>
        <td>{{svc.name}}</td>
        <td>{{svc.serviceType | uppercase}}</td>
        <td>{{svc.basePrice | currency:'PEN':'S/. '}}</td>
        <td>{{svc.priceUnit}}</td>
        <td>
          <i class="pi" [ngClass]="{'pi-check-circle text-green-500': svc.requiresAsset, 'pi-times-circle text-red-500': !svc.requiresAsset}"></i>
        </td>
        <td>
          <p-button icon="pi pi-pencil" styleClass="p-button-warning p-button-sm mr-2" (onClick)="showDialogToEdit(svc)"></p-button>
          <p-button icon="pi pi-trash" styleClass="p-button-danger p-button-sm" (onClick)="deleteService(svc)"></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7">No se encontraron servicios.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<!-- Modal para Crear/Editar Servicio -->
<p-dialog header="{{ editingServiceId ? 'Editar Servicio' : 'Nuevo Servicio' }}" [(visible)]="displayModal" [modal]="true" [style]="{width: '50vw'}">
  <div class="p-fluid grid">
    <div class="field col-12 md:col-6">
      <label for="code">Código *</label>
      <input pInputText id="code" [(ngModel)]="serviceForm.code" required />
    </div>
    <div class="field col-12 md:col-6">
      <label for="name">Nombre del Servicio *</label>
      <input pInputText id="name" [(ngModel)]="serviceForm.name" required />
    </div>
    <div class="field col-12 md:col-6">
      <label for="serviceType">Tipo *</label>
      <p-dropdown [options]="typeOptions" [(ngModel)]="serviceForm.serviceType" appendTo="body"></p-dropdown>
    </div>
    <div class="field col-12 md:col-6">
      <label for="category">Categoría</label>
      <input pInputText id="category" [(ngModel)]="serviceForm.category" />
    </div>
    <div class="field col-12 md:col-4">
      <label for="basePrice">Precio Base *</label>
      <p-inputNumber inputId="basePrice" [(ngModel)]="serviceForm.basePrice" mode="decimal"></p-inputNumber>
    </div>
    <div class="field col-12 md:col-4">
      <label for="currency">Moneda *</label>
      <p-dropdown [options]="currencyOptions" [(ngModel)]="serviceForm.currency" appendTo="body"></p-dropdown>
    </div>
    <div class="field col-12 md:col-4">
      <label for="priceUnit">Unidad de Cobro *</label>
      <p-dropdown [options]="unitOptions" [(ngModel)]="serviceForm.priceUnit" appendTo="body"></p-dropdown>
    </div>
    <div class="field col-12 md:col-8">
      <label for="description">Descripción</label>
      <input pInputText id="description" [(ngModel)]="serviceForm.description" />
    </div>
    <div class="field col-12 md:col-4 flex align-items-end mb-2">
      <div class="flex align-items-center">
        <p-checkbox [(ngModel)]="serviceForm.requiresAsset" [binary]="true" inputId="requiresAsset"></p-checkbox>
        <label for="requiresAsset" class="ml-2">Requiere Activo Físico</label>
      </div>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" styleClass="p-button-text" (onClick)="displayModal=false"></p-button>
    <p-button label="Guardar" icon="pi pi-check" (onClick)="saveService()" [disabled]="!serviceForm.code || !serviceForm.name"></p-button>
  </ng-template>
</p-dialog>
